<style>
  .ord-row {
    background: var(--bg-card, #161616);
    border: 1px solid var(--border, #2a2a2a);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color .25s;
  }
  .ord-row:hover { border-color: rgba(212,132,44,.3); }
  .ord-row.open { border-color: var(--accent, #D4842C); }

  .ord-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    transition: background .15s;
  }
  .ord-header:hover { background: rgba(255,255,255,.02); }

  .ord-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent, #D4842C);
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 14px; flex-shrink: 0;
  }

  .ord-chevron {
    color: var(--muted, #555);
    font-size: 12px;
    transition: transform .3s;
    flex-shrink: 0;
    margin-left: auto;
  }
  .ord-row.open .ord-chevron { transform: rotate(180deg); }

  .ord-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height .4s cubic-bezier(.22,1,.36,1);
  }
  .ord-row.open .ord-body {
    max-height: 800px;
  }

  .ord-canvas {
    display: block;
    width: 100%;
    background: #0F0F0F;
  }
  .ord-spec {
    padding: 10px;
    background: var(--bg, #0a0a0a);
    border-radius: 8px;
    text-align: center;
  }
  .ord-status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .ord-divider {
    height: 1px;
    background: var(--border, #2a2a2a);
    margin: 0 18px;
  }
  .empty-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(212,132,44,.08);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fu { animation: fu .4s ease-out forwards; opacity: 0; }
  @keyframes fu { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* Image modal */
  .img-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,.85);
    backdrop-filter: blur(4px); z-index: 200;
    display: none; align-items: center; justify-content: center;
    padding: 20px; cursor: zoom-out;
  }
  .img-modal.open { display: flex; }
  .img-modal img {
    max-width: 90vw; max-height: 85vh;
    border-radius: 12px; object-fit: contain;
    box-shadow: 0 8px 40px rgba(0,0,0,.5);
    animation: imgPop .3s ease-out;
  }
  @keyframes imgPop {
    from { transform: scale(.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>

function maskCustomer(name,address){
  var first=name?name.split(' ')[0]:'Customer';
  var loc='Malaysia';
  if(address){var parts=address.split(',');var last=parts[parts.length-1].trim().replace(/^\d{5}\s*/,'');loc=last.length>=3?last:(parts.length>1?parts[parts.length-2].trim():'Malaysia')}
  return{name:first,location:loc};
}

function formatDate(d){
  var dt=new Date(d);
  return dt.toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'});

function timeAgo(dateStr){
  var diff=Math.floor((Date.now()-new Date(dateStr).getTime())/1000);
  if(diff<60)return'just now';if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';return Math.floor(diff/86400)+'d ago';
}

function getShipRate(weightKg,address){
  var isEast=false;if(address){var a=address.toLowerCase();isEast=a.indexOf('sabah')>-1||a.indexOf('sarawak')>-1||a.indexOf('labuan')>-1}
  if(isEast){if(weightKg<=5)return 100;if(weightKg<=10)return 150;if(weightKg<=20)return 200;if(weightKg<=31)return 1000;return null}
  else{if(weightKg<=10)return 0;if(weightKg<=20)return 50;if(weightKg<=31)return 100;return null}
}

/* ── CANVAS ── */
function rrect(ctx,x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

function inPan(x,y,w,h,r,m){if(x<m||x>w-m||y<m||y>h-m)return false;if(r<=0)return true;var lx=x-m,ly=y-m,lw=w-2*m,lh=h-2*m,cr=Math.min(r,lw/2,lh/2);if(lx<0||lx>lw||ly<0||ly>lh)return false;if(lx<cr&&ly<cr)return(lx-cr)*(lx-cr)+(ly-cr)*(ly-cr)<=cr*cr;if(lx>lw-cr&&ly<cr)return(lx-(lw-cr))*(lx-(lw-cr))+(ly-cr)*(ly-cr)<=cr*cr;if(lx<cr&&ly>lh-cr)return(lx-cr)*(lx-cr)+(ly-(lh-cr))*(ly-(lh-cr))<=cr*cr;if(lx>lw-cr&&ly>lh-cr)return(lx-(lw-cr))*(lx-(lw-cr))+(ly-(lh-cr))*(ly-(lh-cr))<=cr*cr;return true}

function getHolePositions(pattern,holes,panW,panL,cornerRadius){var res=[];if(pattern==='none')return res;var mg,cx=panW/2,cy=panL/2;var ok=function(x,y,d){mg=d/2+3;return inPan(x,y,panW,panL,cornerRadius,mg)};switch(pattern){case'center':if(ok(cx,cy,holes.diameter))res.push({x:cx,y:cy,d:holes.diameter});break;case'square':{if(ok(cx,cy,holes.centerDia))res.push({x:cx,y:cy,d:holes.centerDia});var pts=[[cx-holes.hDist/2,cy-holes.vDist/2],[cx+holes.hDist/2,cy-holes.vDist/2],[cx-holes.hDist/2,cy+holes.vDist/2],[cx+holes.hDist/2,cy+holes.vDist/2]];for(var i=0;i<pts.length;i++){if(ok(pts[i][0],pts[i][1],holes.edgeDia))res.push({x:pts[i][0],y:pts[i][1],d:holes.edgeDia})}break}case'ring':{var n=holes.count,radius=holes.pcd/2;for(var i=0;i<n;i++){var a=(2*Math.PI*i)/n-Math.PI/2;var x=cx+Math.cos(a)*radius,y=cy+Math.sin(a)*radius;if(ok(x,y,holes.diameter))res.push({x:x,y:y,d:holes.diameter})}break}}return res}

function drawOrderPan(canvasId,config){
  var cv=document.getElementById(canvasId);if(!cv||!config)return;
  var dpr=window.devicePixelRatio||1;var dw=cv.clientWidth;var dh=Math.min(dw*0.65,200);
  cv.style.height=dh+'px';cv.width=dw*dpr;cv.height=dh*dpr;
  var ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,dw,dh);
  var userW=config.width,userL=config.length,userCR=config.cornerRadius;
  var pad=20,aw=dw-pad*2,ah=dh-pad*2,asp=userW/userL,pw,ph;
  if(aw/ah>asp){ph=ah;pw=ph*asp}else{pw=aw;ph=pw/asp}
  var px=(dw-pw)/2,py=(dh-ph)/2,sc=pw/userW,cr=Math.min(userCR*sc,pw/2,ph/2);
  ctx.save();ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=18;ctx.shadowOffsetX=2;ctx.shadowOffsetY=4;
  rrect(ctx,px,py,pw,ph,cr);ctx.fillStyle='#3a3a3a';ctx.fill();ctx.restore();
  var sg=ctx.createLinearGradient(px,py,px+pw,py+ph);
  sg.addColorStop(0,'#C0C0C0');sg.addColorStop(0.2,'#ABABAB');sg.addColorStop(0.45,'#BFBFBF');
  sg.addColorStop(0.55,'#A8A8A8');sg.addColorStop(0.8,'#B5B5B5');sg.addColorStop(1,'#959595');
  rrect(ctx,px,py,pw,ph,cr);ctx.fillStyle=sg;ctx.fill();
  ctx.save();rrect(ctx,px,py,pw,ph,cr);ctx.clip();
  for(var ly=py+1.5;ly<py+ph-1;ly+=2.5){var idx=Math.round((ly-py)/2.5);var op=idx%4===0?0.04:idx%3===0?0.018:0.008;ctx.beginPath();ctx.moveTo(px,ly);ctx.lineTo(px+pw,ly);ctx.strokeStyle='rgba(255,255,255,'+op+')';ctx.lineWidth=0.5;ctx.stroke()}
  ctx.restore();
  var hp=getHolePositions(config.holes.pattern,config.holes,userW,userL,userCR);
  if(hp.length>0){
    ctx.save();rrect(ctx,px,py,pw,ph,cr);ctx.clip();
    ctx.globalCompositeOperation='destination-out';
    for(var hi=0;hi<hp.length;hi++){var hole=hp[hi];var hx=px+hole.x*sc;var hy=py+hole.y*sc;var hr=Math.max((hole.d/2)*sc,2);ctx.beginPath();ctx.arc(hx,hy,hr,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,1)';ctx.fill()}
    ctx.restore();
  }
  rrect(ctx,px,py,pw,ph,cr);ctx.strokeStyle='rgba(200,200,200,.1)';ctx.lineWidth=1;ctx.stroke();
}

var canvasConfigs={};
var _origDraw=drawOrderPan;
drawOrderPan=function(id,config){canvasConfigs[id]=config;_origDraw(id,config)};

/* ── TOGGLE ── */
function toggleOrder(idx){
  var row=document.getElementById('or-'+idx);
  var wasOpen=row.classList.contains('open');
  document.querySelectorAll('.ord-row.open').forEach(function(el){el.classList.remove('open')});
  if(!wasOpen){
    row.classList.add('open');
    var cvId='ocv-'+idx;
    if(!canvasConfigs[cvId]){
      var cfg=window['_pendingCfg_'+idx];
      if(cfg){requestAnimationFrame(function(){drawOrderPan(cvId,cfg)})}
    }
  }
}

        var rv=reviewMap[o.id]||null;
        html+='<div class="px-5 pb-4">';
        html+='<div class="ord-divider" style="margin:0 0 14px 0"></div>';
        if(rv){
          var stars='';
          for(var si=1;si<=5;si++){
            stars+='<i class="fas fa-star" style="font-size:13px;color:'+(si<=rv.rating?'#EAB308':'var(--border)')+'"></i>';
          }
          html+='<div class="flex items-center gap-2 mb-2">'+stars+'<span class="text-xs" style="color:var(--muted)">· '+formatDate(rv.created_at)+'</span></div>';
          if(rv.comment){
            html+='<p class="text-sm mb-3" style="color:var(--text);line-height:1.6;font-style:italic">"'+rv.comment.replace(/</g,'&lt;')+'"</p>';
          }
          if(rv.images&&rv.images.length>0){
            html+='<div class="flex gap-2 flex-wrap">';
            for(var ii=0;ii<rv.images.length;ii++){
              html+='<div style="width:72px;height:72px;border-radius:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer" onclick="openReviewImg(\''+rv.images[ii]+'\')">';
              html+='<img src="'+rv.images[ii]+'" style="width:100%;height:100%;object-fit:cover" loading="lazy">';
              html+='</div>';
            }
            html+='</div>';
          }
        }else{
          html+='<div class="flex items-center justify-between" style="padding:12px 16px;border-radius:10px;border:1px dashed var(--border)">';
          html+='<div class="flex items-center gap-2"><i class="fas fa-star text-xs" style="color:var(--accent)"></i><span class="text-sm" style="color:var(--muted)">No review yet</span></div>';
          html+='<a href="review.html?id='+o.id+'" class="bp" style="padding:8px 16px;font-size:13px"><i class="fas fa-pen mr-1"></i>Leave Review</a>';
          html+='</div>';
        }
        html+='</div>';
      }

      html+='</div>';
      html+='</div>';
    }

    document.getElementById('ord-list').innerHTML=html;
    document.getElementById('ord-list').style.display='flex';

  }catch(e){
    console.error(e);
    document.getElementById('ord-loading').style.display='none';
    document.getElementById('ord-empty').style.display='block';
  }
}

var rsz;
window.addEventListener('resize',function(){
  clearTimeout(rsz);
  rsz=setTimeout(function(){
    for(var id in canvasConfigs){
      var cv=document.getElementById(id);
      if(cv&&cv.closest('.ord-row.open')){drawOrderPan(id,canvasConfigs[id])}
    }
  },200);
});

loadOrders();
</script>
</body>
</html>
